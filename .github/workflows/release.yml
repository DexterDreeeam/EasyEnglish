name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0). The release will be tagged v<version>.'
        required: true
        default: '0.2.0'

permissions:
  contents: write

env:
  VCPKG_COMMIT: '81de6771512413aaf89ea77add5ad1fda126b9d0'

jobs:
  windows-installer:
    name: Windows installer
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -e
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
            TAG="v$VER"
          else
            TAG="${GITHUB_REF##*/}"   # e.g. v0.2.0
            VER="${TAG#v}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG version=$VER"

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Fetch CJK + Latin fonts (Noto)
        shell: pwsh
        run: |
          $fontsDir = "assets/fonts"
          New-Item -ItemType Directory -Force -Path $fontsDir | Out-Null
          $files = @(
            @{ Name = 'NotoSans-Regular.ttf';
               Url  = 'https://github.com/notofonts/notofonts.github.io/raw/main/fonts/NotoSans/hinted/ttf/NotoSans-Regular.ttf' }
            @{ Name = 'NotoSansSC-Regular.otf';
               Url  = 'https://github.com/notofonts/noto-cjk/raw/main/Sans/OTF/SimplifiedChinese/NotoSansSC-Regular.otf' }
          )
          foreach ($f in $files) {
            $dst = Join-Path $fontsDir $f.Name
            Write-Host "Downloading $($f.Name)..."
            Invoke-WebRequest -Uri $f.Url -OutFile $dst -UseBasicParsing
            $size = (Get-Item $dst).Length
            if ($size -lt 100000) { throw "Font $($f.Name) too small ($size bytes), download likely failed." }
            Write-Host "  -> $size bytes"
          }

      - name: Configure (Release)
        shell: cmd
        run: cmake --preset msvc-release
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Build (Release)
        shell: cmd
        run: cmake --build --preset msvc-release --parallel

      - name: Smoke-test the release binary exists
        shell: pwsh
        run: |
          $exe = "build/msvc-release/src/EasyEnglish.exe"
          if (-not (Test-Path $exe)) { throw "Release exe not found at $exe" }
          (Get-Item $exe).Length
          Write-Host "OK: $exe"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "Inno Setup ISCC.exe not found at $iscc" }
          Write-Host "Inno Setup ready at $iscc"

      - name: Build installer
        shell: pwsh
        run: |
          pwsh tools/build_installer.ps1
          Get-ChildItem installer/dist | Format-Table Name, Length

      - name: Stage installer artifact with stable name
        shell: pwsh
        run: |
          $src = Get-ChildItem installer/dist/EasyEnglishSetup-*.exe | Select-Object -First 1
          if ($null -eq $src) { throw "No installer produced under installer/dist" }
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          $dst = "artifact/EasyEnglishSetup-${{ steps.ver.outputs.version }}.exe"
          Copy-Item $src.FullName $dst
          # Generate a SHA256 alongside so downloaders can verify integrity.
          (Get-FileHash $dst -Algorithm SHA256).Hash + "  " + (Split-Path $dst -Leaf) `
            | Out-File -Encoding ascii "$dst.sha256"
          Get-ChildItem artifact | Format-Table Name, Length

      - name: Upload artifact (always available even without a Release)
        uses: actions/upload-artifact@v4
        with:
          name: EasyEnglishSetup-${{ steps.ver.outputs.version }}
          path: artifact/*
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ steps.ver.outputs.tag }}"
          $ver = "${{ steps.ver.outputs.version }}"
          # Ensure the tag exists on the remote when invoked via workflow_dispatch.
          $existing = git ls-remote --tags origin $tag
          if (-not $existing) {
              git config user.name  "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag $tag
              git push origin $tag
          }
          # Create the release (idempotent: if it already exists, just upload new assets).
          $exists = gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
              gh release create $tag `
                  --title "EasyEnglish $ver" `
                  --notes "Automated release built by .github/workflows/release.yml. See CHANGELOG / commit history for details." `
                  artifact/*
          } else {
              gh release upload $tag artifact/* --clobber
          }
