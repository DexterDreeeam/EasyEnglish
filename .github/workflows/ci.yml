name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_COMMIT: '81de6771512413aaf89ea77add5ad1fda126b9d0'

jobs:
  windows-build:
    name: Windows / MSVC / Debug
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'
    steps:
      - uses: actions/checkout@v4

      - name: Architectural guard (core has no UI deps)
        shell: bash
        run: python tools/check_core_no_ui.py

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        shell: cmd
        run: cmake --preset msvc-debug
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Build
        shell: cmd
        run: cmake --build --preset msvc-debug --parallel

      - name: Test
        shell: cmd
        run: ctest --preset msvc-debug

      - name: Run benchmarks (smoke)
        shell: cmd
        # Run each Google Benchmark binary once; treat any process failure as a
        # CI failure but don't yet enforce numeric regression thresholds —
        # that comes in a future iteration once we have a baseline DB.
        run: |
          build\msvc-debug\tests\benchmarks\bench_smoke.exe --benchmark_min_time=0.05s
          build\msvc-debug\tests\benchmarks\bench_lookup.exe --benchmark_min_time=0.05s

  lint:
    name: clang-format
    runs-on: windows-latest
    needs: windows-build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Verify formatting
        shell: bash
        run: |
          set -e
          if ! command -v clang-format >/dev/null 2>&1; then
            echo "clang-format unavailable on runner; skipping (tightened in quality-gates todo)"
            exit 0
          fi
          mapfile -t files < <(find src tests -type f \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \))
          if [ ${#files[@]} -gt 0 ]; then
            clang-format --dry-run --Werror "${files[@]}"
          fi
