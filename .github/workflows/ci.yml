name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_COMMIT: '81de6771512413aaf89ea77add5ad1fda126b9d0'
  QT_VERSION: '6.8.3'

jobs:
  windows-build:
    name: Windows / MSVC / Debug
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'
    steps:
      - uses: actions/checkout@v4

      - name: Architectural guard (core has no Qt UI)
        shell: bash
        run: python tools/check_core_no_ui.py

      - name: Cache Qt
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ${{ runner.workspace }}/Qt
          key: qt-${{ runner.os }}-${{ env.QT_VERSION }}-msvc2022_64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: ''
          cache: true
          cache-key-prefix: qt-cache

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        shell: cmd
        run: cmake --preset msvc-debug
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Build
        shell: cmd
        run: cmake --build --preset msvc-debug --parallel

      - name: Test
        shell: cmd
        run: ctest --preset msvc-debug

  lint:
    name: clang-format
    runs-on: windows-latest
    needs: windows-build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Verify formatting
        shell: bash
        run: |
          set -e
          if ! command -v clang-format >/dev/null 2>&1; then
            echo "clang-format unavailable on runner; skipping (tightened in quality-gates todo)"
            exit 0
          fi
          mapfile -t files < <(find src tests -type f \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \))
          if [ ${#files[@]} -gt 0 ]; then
            clang-format --dry-run --Werror "${files[@]}"
          fi

      # Real clang-tidy invocation needs compile_commands.json from the build job
      # plus Qt headers on disk. Wired in the quality-gates todo.
