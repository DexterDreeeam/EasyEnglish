[workspace]
resolver = "2"
members = [
    "Core",
    "Dict",
    "Linux",
    "Mac",
    "Utils",
    "Win",
]

[workspace.package]
# Shared metadata. Individual crates inherit these via `name = ...` only.
version       = "1.0.0-alpha.1"
edition       = "2021"
rust-version  = "1.83"
license       = "MIT"
authors       = ["EasyEnglish Contributors"]
repository    = "https://github.com/DexterDreeeam/EasyEnglish"
description   = "EasyEnglish — modular English-to-Chinese desktop translator (Rust, m2a-style)"

[workspace.dependencies]
# Pinned exactly here so any drift is a one-line change. Members opt-in with
# `serde = { workspace = true }`.
anyhow            = "1"
thiserror         = "2"
serde             = { version = "1", features = ["derive"] }
serde_json        = "1"
rusqlite          = { version = "0.32", features = ["bundled"] }
directories       = "5"
once_cell         = "1"
tempfile          = "3"

[workspace.lints.rust]
# Treating warnings as errors in CI is too strict for a project without CI;
# keep them as warnings so the developer sees them but commits aren't blocked.
unused_must_use   = "warn"
rust_2018_idioms  = "warn"
unreachable_pub   = "warn"

[workspace.lints.clippy]
# Sensible defaults — easy to tighten later.
all                = { level = "warn", priority = -1 }
needless_collect   = "warn"
redundant_clone    = "warn"
# Disabled because they fire on idiomatic code from the standard generated by
# rusqlite/serde and don't materially help readability:
module_name_repetitions = "allow"

# ---- Build profiles ---------------------------------------------------------

[profile.dev]
# Speed up incremental linking: emit debug info to a sidecar instead of into
# every .obj so the linker has less work each time.
split-debuginfo = "unpacked"
# More codegen units = more parallelism on multi-core machines, at the cost of
# slightly worse runtime perf (irrelevant for dev builds).
codegen-units = 256
incremental = true

[profile.dev.package."*"]
# Our own code is left unoptimized so the compiler is fast.
opt-level = 0

[profile.dev.package.rusqlite]
# sqlite itself is hot path — building it unoptimized makes every test sluggish.
opt-level = 2
[profile.dev.package.libsqlite3-sys]
opt-level = 2

[profile.release]
# Default release tuning. LTO is opt-in via `--profile dist` (see below) to
# keep `cargo build --release` snappy during day-to-day work.
opt-level = 3
codegen-units = 16
debug = "limited"
strip = "symbols"
incremental = false

[profile.dist]
# Used by future installer iterations: `cargo build --profile dist`.
inherits = "release"
lto = "thin"
codegen-units = 1
panic = "abort"
strip = "symbols"
